{% extends "base.html" %}
{% block title %}Index 검수 - 더벨 News Clipper{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
{% endblock %}

{% block content %}
<div class="container">
    <h1>Index 검수</h1>
    <p style="margin-bottom: 16px; color: var(--text-light);">
        AI가 생성한 목차 초안입니다. 기사 블록을 드래그하여 순서를 변경하세요.
    </p>

    <div id="classification-tree"></div>

    <div style="text-align: center; margin-top: 24px;">
        <button class="btn btn-primary" id="btn-confirm" style="font-size: 16px; padding: 12px 40px;">
            확정 및 PDF/DOCX 생성
        </button>
    </div>

    <div id="finalize-status" style="display: none; margin-top: 20px;">
        <div class="card">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="spinner"></div>
                <span id="finalize-msg">PDF/DOCX 생성 중...</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const SESSION_ID = "{{ session.session_id }}";
let treeData = null;

async function loadClassification() {
    const res = await fetch(`/api/classification/${SESSION_ID}`);
    const data = await res.json();
    treeData = data.tree;
    renderTree(treeData);
}

function renderTree(tree) {
    const container = document.getElementById('classification-tree');
    container.innerHTML = '';

    tree.forEach((cat, catIdx) => {
        const catCard = document.createElement('div');
        catCard.className = 'card ri-category';
        catCard.dataset.catIdx = catIdx;

        const catHeader = document.createElement('h2');
        catHeader.textContent = `${catIdx + 1}. ${cat.name}`;
        catCard.appendChild(catHeader);

        // Direct articles under category
        if (cat.articles && cat.articles.length > 0) {
            const list = createSortableList(cat.articles);
            catCard.appendChild(list);
        }

        // Subcategories
        if (cat.subcategories) {
            cat.subcategories.forEach((sub, subIdx) => {
                const subSection = document.createElement('div');
                subSection.className = 'ri-subcategory';

                const subHeader = document.createElement('h3');
                subHeader.textContent = `${String.fromCharCode(65 + subIdx)}. ${sub.name}`;
                subSection.appendChild(subHeader);

                // Direct articles under subcategory
                if (sub.articles && sub.articles.length > 0) {
                    const list = createSortableList(sub.articles);
                    subSection.appendChild(list);
                }

                // Sub-items
                if (sub.sub_items) {
                    sub.sub_items.forEach(si => {
                        const siSection = document.createElement('div');
                        siSection.className = 'ri-subitem';

                        const siHeader = document.createElement('div');
                        siHeader.className = 'ri-subitem-header';
                        siHeader.textContent = `- ${si.name}`;
                        siSection.appendChild(siHeader);

                        if (si.articles && si.articles.length > 0) {
                            const list = createSortableList(si.articles);
                            siSection.appendChild(list);
                        }

                        subSection.appendChild(siSection);
                    });
                }

                catCard.appendChild(subSection);
            });
        }

        container.appendChild(catCard);
    });
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function createSortableList(articles) {
    const list = document.createElement('div');
    list.className = 'ri-article-list';

    articles.forEach((art, idx) => {
        const item = document.createElement('div');
        item.className = 'ri-article-item';
        item.dataset.id = art.id;

        const catTag = art.category
            ? `<span class="ri-article-cat-tag">${escapeHtml(art.category)}</span>`
            : '';

        const summary = art.summary
            ? `<div class="ri-article-summary">${escapeHtml(art.summary)}</div>`
            : '';

        item.innerHTML = `
            <div class="ri-drag-handle" title="드래그하여 순서 변경">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path d="M7 2a2 2 0 10.001 4.001A2 2 0 007 2zm0 6a2 2 0 10.001 4.001A2 2 0 007 8zm0 6a2 2 0 10.001 4.001A2 2 0 007 14zm6-8a2 2 0 10-.001-4.001A2 2 0 0013 6zm0 2a2 2 0 10.001 4.001A2 2 0 0013 8zm0 6a2 2 0 10.001 4.001A2 2 0 0013 14z"/>
                </svg>
            </div>
            <div class="ri-article-body">
                <div class="ri-article-num">${idx + 1}</div>
                <div class="ri-article-info">
                    <div class="ri-article-title">
                        <a href="${escapeHtml(art.url)}" target="_blank">${escapeHtml(art.title)}</a>
                    </div>
                    <div class="ri-article-meta">${catTag}</div>
                    ${summary}
                </div>
            </div>
        `;

        list.appendChild(item);
    });

    // Enable drag-and-drop via SortableJS
    new Sortable(list, {
        handle: '.ri-drag-handle',
        animation: 200,
        ghostClass: 'ri-ghost',
        chosenClass: 'ri-chosen',
        dragClass: 'ri-drag',
        onEnd: function() {
            renumberList(list);
        }
    });

    return list;
}

function renumberList(list) {
    list.querySelectorAll('.ri-article-item').forEach((item, idx) => {
        const numEl = item.querySelector('.ri-article-num');
        if (numEl) numEl.textContent = idx + 1;
    });
}

function collectTree() {
    // Rebuild tree data from DOM order
    const container = document.getElementById('classification-tree');
    const catCards = container.querySelectorAll('.ri-category');

    return treeData.map((cat, catIdx) => {
        const catCard = catCards[catIdx];
        const result = { name: cat.name, articles: [], subcategories: [] };

        // Direct articles
        const directList = catCard.querySelector(':scope > .ri-article-list');
        if (directList) {
            result.articles = collectArticlesFromList(directList);
        }

        // Subcategories
        const subSections = catCard.querySelectorAll(':scope > .ri-subcategory');
        if (cat.subcategories) {
            cat.subcategories.forEach((sub, subIdx) => {
                const subSection = subSections[subIdx];
                const subResult = { name: sub.name, articles: [], sub_items: [] };

                const subList = subSection ? subSection.querySelector(':scope > .ri-article-list') : null;
                if (subList) {
                    subResult.articles = collectArticlesFromList(subList);
                }

                // Sub-items
                const siSections = subSection ? subSection.querySelectorAll(':scope > .ri-subitem') : [];
                if (sub.sub_items) {
                    sub.sub_items.forEach((si, siIdx) => {
                        const siSection = siSections[siIdx];
                        const siResult = { name: si.name, articles: [] };
                        const siList = siSection ? siSection.querySelector('.ri-article-list') : null;
                        if (siList) {
                            siResult.articles = collectArticlesFromList(siList);
                        }
                        subResult.sub_items.push(siResult);
                    });
                }

                result.subcategories.push(subResult);
            });
        }

        return result;
    });
}

function collectArticlesFromList(list) {
    const articles = [];
    list.querySelectorAll('.ri-article-item').forEach(item => {
        const id = item.dataset.id;
        // Find article data from original tree
        const art = findArticle(id);
        if (art) articles.push(art);
    });
    return articles;
}

function findArticle(id) {
    for (const cat of treeData) {
        for (const a of (cat.articles || [])) { if (a.id === id) return a; }
        for (const sub of (cat.subcategories || [])) {
            for (const a of (sub.articles || [])) { if (a.id === id) return a; }
            for (const si of (sub.sub_items || [])) {
                for (const a of (si.articles || [])) { if (a.id === id) return a; }
            }
        }
    }
    return null;
}

document.getElementById('btn-confirm').addEventListener('click', async () => {
    const btn = document.getElementById('btn-confirm');
    btn.disabled = true;
    btn.textContent = '처리 중...';

    const tree = collectTree();

    const res = await fetch(`/api/confirm-index/${SESSION_ID}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tree }),
    });

    if (!res.ok) {
        const err = await res.json();
        alert('오류: ' + (err.detail || '알 수 없는 오류'));
        btn.disabled = false;
        btn.textContent = '확정 및 PDF/DOCX 생성';
        return;
    }

    // Show progress and connect SSE
    document.getElementById('finalize-status').style.display = 'block';
    btn.style.display = 'none';

    const evtSource = new EventSource(`/api/progress/${SESSION_ID}`);
    const msgEl = document.getElementById('finalize-msg');

    evtSource.onmessage = function(event) {
        msgEl.textContent = event.data;
    };

    evtSource.addEventListener('done', function(event) {
        evtSource.close();
        const status = event.data;
        if (status === 'done') {
            window.location.href = `/result/${SESSION_ID}`;
        } else {
            msgEl.textContent = '오류가 발생했습니다.';
            msgEl.style.color = 'var(--error)';
        }
    });

    evtSource.onerror = function() {
        evtSource.close();
    };
});

// Load on page ready
loadClassification();
</script>
{% endblock %}
